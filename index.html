<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I'm sorry ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<div class="container">


    <!-- Başlangıç -->

    <div id="start">

        <img src="envelope.png" id="envelope">

        <p id="sorry">
            I'm sorry...
        </p>

    </div>



    <!-- Mektup -->

    <div id="letter" class="hidden">

        <div class="paper">

            <p>
                I'm sorry if I hurt you lately. ❤️
            </p>

            <span>
                (click)
            </span>

        </div>

    </div>



    <!-- GIF bölümü -->

    <div id="gifBox" class="hidden">

        <img id="gif">

    </div>



    <!-- I miss you -->

    <h1 id="miss" class="hidden">
        I miss you. ❤️
    </h1>




    <!-- Barışma -->

    <div id="okayBox" class="hidden">

        <h1>
            Can we be okay again? ❤️
        </h1>


        <button class="moving yes1">
            Yes ❤️
        </button>


        <button class="moving yes2">
            Of course yes ❤️
        </button>


        <button class="moving yes3">
            Definitely yes ❤️
        </button>


    </div>





    <!-- Kedi bölümü -->

    <div id="catBox" class="hidden">

        <h1>
            Can I be your cat? 🐱❤️
        </h1>


        <button id="catYes">
            Yes ❤️
        </button>


        <button id="catNo">
            No 💔
        </button>


    </div>



</div>



<script src="script.js"></script>


</body>

</html>
